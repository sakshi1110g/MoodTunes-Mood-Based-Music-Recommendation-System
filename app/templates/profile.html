{% extends "base.html" %}

{% block title %}Profile - MoodTunes{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.min.css">
<style>
    .profile {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        background: rgba(0, 0, 0, 0.5);
        padding: 80px 20px 20px;
        backdrop-filter: blur(10px);
    }

    #profile-form {
        max-width: 500px;
        width: 100%;
        margin: 0 auto;
    }

    #image-cropper {
        margin-top: 20px;
    }
</style>
{% endblock %}

{% block content %}
<section class="profile">
    <h1>Profile</h1>
    <form action="/profile" method="POST" enctype="multipart/form-data" id="profile-form">
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" value="{{ user.name if user.name else '' }}" placeholder="Enter your name">
        </div>
        <div class="form-group">
            <label for="profile_picture">Profile Picture</label>
            <input type="file" id="profile_picture" name="profile_picture" accept="image/*">
        </div>
        <div id="image-cropper" style="display: none;">
            <img id="cropper-image" src="" alt="Cropper Image">
        </div>
        <button type="submit" class="cta-button">Update Profile</button>
    </form>
</section>
{% endblock %}

{% block extra_js %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.min.js"></script>
<script>
    document.getElementById('refresh-button').addEventListener('click', function() {
        location.reload();
    });

    const profilePictureInput = document.getElementById('profile_picture');
    const cropperImage = document.getElementById('cropper-image');
    const imageCropper = document.getElementById('image-cropper');
    let cropper;

    profilePictureInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                cropperImage.src = event.target.result;
                imageCropper.style.display = 'block';

                if (cropper) {
                    cropper.destroy();
                }
                cropper = new Cropper(cropperImage, {
                    aspectRatio: 1,  
                    viewMode: 1,   
                    autoCropArea: 1, 
                });
            };
            reader.readAsDataURL(file);
        }
    });

    document.getElementById('profile-form').addEventListener('submit', function(e) {
        if (cropper) {
            cropper.getCroppedCanvas().toBlob(function(blob) {
                const formData = new FormData();
                formData.append('name', document.getElementById('name').value);
                formData.append('profile_picture', blob, 'cropped-profile.jpg');

                fetch('/profile', {
                    method: 'POST',
                    body: formData,
                }).then(response => {
                    if (response.ok) {
                        window.location.href = '/profile';  
                    } else {
                        alert('Failed to update profile.');
                    }
                });
            });
            e.preventDefault();  
        }
    });
</script>
{% endblock %}
